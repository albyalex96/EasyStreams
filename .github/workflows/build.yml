name: Build and Push Docker Images on GHCR

on:
  push:
    branches: [ "main" ] # Si attiva quando pushi su main
    tags: [ 'v*.*.*' ]   # Si attiva quando crei un tag (es. v1.0.0)
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessario per scrivere su GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configura l'ambiente per il build multi-piattaforma (opzionale ma consigliato)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 1. Login su GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Estrazione metadata pulita solo per GHCR
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # 4. Build e Push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
